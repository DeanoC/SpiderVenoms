name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-release:
    name: linux-release (${{ matrix.arch_label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch_label: x86_64
          - runner: ubuntu-24.04-arm
            arch_label: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout SpiderVenoms
        uses: actions/checkout@v4
        with:
          path: SpiderVenoms

      - name: Checkout Spiderweb
        uses: actions/checkout@v4
        with:
          repository: DeanoC/Spiderweb
          path: Spiderweb
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Prepare OpenSSL
        run: |
          set -euo pipefail
          if [[ "$(uname -s)" != "Darwin" ]]; then
            command -v openssl >/dev/null 2>&1
            exit 0
          fi
          if [[ -x "/opt/homebrew/opt/openssl@3/bin/openssl" ]]; then
            echo "/opt/homebrew/opt/openssl@3/bin" >> "$GITHUB_PATH"
          elif command -v brew >/dev/null 2>&1 && brew list openssl@3 >/dev/null 2>&1; then
            echo "$(brew --prefix openssl@3)/bin" >> "$GITHUB_PATH"
          else
            brew install openssl@3
            echo "$(brew --prefix openssl@3)/bin" >> "$GITHUB_PATH"
          fi

      - name: Resolve release metadata
        id: meta
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          version="$(sed -n 's/.*\.version = "\(.*\)",/\1/p' build.zig.zon | head -n1)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "arch_label=${{ matrix.arch_label }}" >> "$GITHUB_OUTPUT"
          echo "archive_path=SpiderVenoms/dist/spidervenoms-managed-local-linux-${{ matrix.arch_label }}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "archive_sha_path=SpiderVenoms/dist/spidervenoms-managed-local-linux-${{ matrix.arch_label }}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Validate version sync
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          bash ./scripts/check-version-sync.sh

      - name: Run managed bundle policy checks
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          bash ./scripts/test_managed_bundle_policy.sh
          bash ./scripts/test_managed_bundle_key_workflow.sh

      - name: Validate tag matches build version
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          expected_tag="v${{ steps.meta.outputs.version }}"
          actual_tag="${GITHUB_REF_NAME}"
          if [[ "$actual_tag" != "$expected_tag" ]]; then
            echo "Tag/version mismatch: expected ${expected_tag}, got ${actual_tag}" >&2
            exit 1
          fi

      - name: Build and test
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          zig build test
          zig build bundle

      - name: Build Linux release archive
        working-directory: SpiderVenoms
        env:
          SPIDERWEB_REPO_DIR: ${{ github.workspace }}/Spiderweb
        run: |
          set -euo pipefail
          bash ./scripts/package-spidervenoms-linux-release.sh --out-dir "$PWD/dist"

      - name: Verify release archive contents
        run: |
          set -euo pipefail
          archive="${{ steps.meta.outputs.archive_path }}"
          sha_path="${{ steps.meta.outputs.archive_sha_path }}"
          test -f "$archive"
          test -f "$sha_path"
          python3 - "$archive" <<'PY'
          import sys
          import tarfile

          archive_path = sys.argv[1]
          with tarfile.open(archive_path, "r:gz") as archive:
              names = archive.getnames()

          assert any(name.endswith("share/spidervenoms/bundles/managed-local/release.json") for name in names)
          assert any(name.endswith("bin/spiderweb-local-service") for name in names)
          PY

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spidervenoms-managed-local-linux-${{ steps.meta.outputs.arch_label }}
          path: |
            ${{ steps.meta.outputs.archive_path }}
            ${{ steps.meta.outputs.archive_sha_path }}
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.meta.outputs.archive_path }}
            ${{ steps.meta.outputs.archive_sha_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  macos-release:
    name: macos-release
    runs-on: macos-latest
    steps:
      - name: Checkout SpiderVenoms
        uses: actions/checkout@v4
        with:
          path: SpiderVenoms

      - name: Checkout Spiderweb
        uses: actions/checkout@v4
        with:
          repository: DeanoC/Spiderweb
          path: Spiderweb
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Resolve release metadata
        id: meta
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          version="$(sed -n 's/.*\.version = "\(.*\)",/\1/p' build.zig.zon | head -n1)"
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64) arch_label="x86_64" ;;
            arm64|aarch64) arch_label="arm64" ;;
            *) arch_label="$arch" ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "arch_label=$arch_label" >> "$GITHUB_OUTPUT"
          echo "archive_path=SpiderVenoms/dist/spidervenoms-managed-local-macos-${arch_label}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "archive_sha_path=SpiderVenoms/dist/spidervenoms-managed-local-macos-${arch_label}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Validate version sync
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          bash ./scripts/check-version-sync.sh

      - name: Run managed bundle policy checks
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          bash ./scripts/test_managed_bundle_policy.sh
          bash ./scripts/test_managed_bundle_key_workflow.sh

      - name: Validate tag matches build version
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          expected_tag="v${{ steps.meta.outputs.version }}"
          actual_tag="${GITHUB_REF_NAME}"
          if [[ "$actual_tag" != "$expected_tag" ]]; then
            echo "Tag/version mismatch: expected ${expected_tag}, got ${actual_tag}" >&2
            exit 1
          fi

      - name: Build and test
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          zig build
          zig build test

      - name: Build macOS release archive
        working-directory: SpiderVenoms
        env:
          SPIDERWEB_REPO_DIR: ${{ github.workspace }}/Spiderweb
        run: |
          set -euo pipefail
          bash ./scripts/package-spidervenoms-macos-release.sh --out-dir "$PWD/dist"

      - name: Verify release archive contents
        run: |
          set -euo pipefail
          archive="${{ steps.meta.outputs.archive_path }}"
          sha_path="${{ steps.meta.outputs.archive_sha_path }}"
          test -f "$archive"
          test -f "$sha_path"
          python3 - "$archive" <<'PY'
          import sys
          import tarfile

          archive_path = sys.argv[1]
          with tarfile.open(archive_path, "r:gz") as archive:
              names = archive.getnames()

          assert any(name.endswith("share/spidervenoms/bundles/managed-local/release.json") for name in names)
          assert any(name.endswith("bin/spiderweb-local-service") for name in names)
          PY

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spidervenoms-managed-local-macos-${{ steps.meta.outputs.arch_label }}
          path: |
            ${{ steps.meta.outputs.archive_path }}
            ${{ steps.meta.outputs.archive_sha_path }}
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.meta.outputs.archive_path }}
            ${{ steps.meta.outputs.archive_sha_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  release-facts:
    name: release-facts
    runs-on: ubuntu-latest
    needs:
      - linux-release
      - macos-release
    steps:
      - name: Checkout SpiderVenoms
        uses: actions/checkout@v4
        with:
          path: SpiderVenoms

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: spidervenoms-managed-local-*
          merge-multiple: true
          path: SpiderVenoms/dist

      - name: Generate release facts
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          python3 ./scripts/render_release_facts.py \
            --resolve-published-checksums \
            --out "$PWD/dist/spidervenoms-release-facts.json"
          test -f "$PWD/dist/spidervenoms-release-facts.json"

      - name: Upload release facts artifact
        uses: actions/upload-artifact@v4
        with:
          name: spidervenoms-release-facts
          path: SpiderVenoms/dist/spidervenoms-release-facts.json
          if-no-files-found: error

      - name: Publish GitHub release facts
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: SpiderVenoms/dist/spidervenoms-release-facts.json
          generate_release_notes: false
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
