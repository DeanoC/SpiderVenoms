name: ci

on:
  pull_request:
  push:

jobs:
  linux-build-test-and-package:
    name: linux-build-test-and-package (${{ matrix.arch_label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch_label: x86_64
          - runner: ubuntu-24.04-arm
            arch_label: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout SpiderVenoms
        uses: actions/checkout@v4
        with:
          path: SpiderVenoms

      - name: Checkout Spiderweb
        uses: actions/checkout@v4
        with:
          repository: DeanoC/Spiderweb
          path: Spiderweb
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Validate version sync
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          bash ./scripts/check-version-sync.sh

      - name: Build and test
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          zig build test
          zig build bundle

      - name: Build Linux release archive
        working-directory: SpiderVenoms
        env:
          SPIDERWEB_REPO_DIR: ${{ github.workspace }}/Spiderweb
        run: |
          set -euo pipefail
          bash ./scripts/package-spidervenoms-linux-release.sh --out-dir "$PWD/dist"

      - name: Verify release archive contents
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          archive_path="$PWD/dist/spidervenoms-managed-local-linux-${{ matrix.arch_label }}.tar.gz"
          sha_path="${archive_path}.sha256"
          test -f "$archive_path"
          test -f "$sha_path"
          python3 - "$archive_path" <<'PY'
          import sys
          import tarfile

          archive_path = sys.argv[1]
          with tarfile.open(archive_path, "r:gz") as archive:
              names = archive.getnames()

          assert any(name.endswith("share/spidervenoms/bundles/managed-local/release.json") for name in names)
          assert any(name.endswith("bin/spiderweb-local-service") for name in names)
          PY

  macos-build-and-test:
    name: macos-build-and-test
    runs-on: macos-latest
    steps:
      - name: Checkout SpiderVenoms
        uses: actions/checkout@v4
        with:
          path: SpiderVenoms

      - name: Checkout Spiderweb
        uses: actions/checkout@v4
        with:
          repository: DeanoC/Spiderweb
          path: Spiderweb
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Validate version sync
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          bash ./scripts/check-version-sync.sh

      - name: Build and test
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          zig build
          zig build test

      - name: Build macOS release archive
        working-directory: SpiderVenoms
        env:
          SPIDERWEB_REPO_DIR: ${{ github.workspace }}/Spiderweb
        run: |
          set -euo pipefail
          bash ./scripts/package-spidervenoms-macos-release.sh --out-dir "$PWD/dist"

      - name: Verify macOS release archive contents
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          archive_path="$PWD/dist/spidervenoms-managed-local-macos-$(uname -m | sed 's/amd64/x86_64/; s/aarch64/arm64/').tar.gz"
          sha_path="${archive_path}.sha256"
          test -f "$archive_path"
          test -f "$sha_path"
          python3 - "$archive_path" <<'PY'
          import sys
          import tarfile

          archive_path = sys.argv[1]
          with tarfile.open(archive_path, "r:gz") as archive:
              names = archive.getnames()

          assert any(name.endswith("share/spidervenoms/bundles/managed-local/release.json") for name in names)
          assert any(name.endswith("bin/spiderweb-local-service") for name in names)
          PY
