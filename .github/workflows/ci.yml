name: ci

on:
  pull_request:
  push:

jobs:
  linux-build-test-and-package:
    name: linux-build-test-and-package (${{ matrix.arch_label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch_label: x86_64
          - runner: ubuntu-24.04-arm
            arch_label: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout SpiderVenoms
        uses: actions/checkout@v4
        with:
          path: SpiderVenoms

      - name: Checkout Spiderweb
        uses: actions/checkout@v4
        with:
          repository: DeanoC/Spiderweb
          path: Spiderweb
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Prepare OpenSSL
        run: |
          set -euo pipefail
          if [[ "$(uname -s)" != "Darwin" ]]; then
            command -v openssl >/dev/null 2>&1
            exit 0
          fi
          if [[ -x "/opt/homebrew/opt/openssl@3/bin/openssl" ]]; then
            echo "/opt/homebrew/opt/openssl@3/bin" >> "$GITHUB_PATH"
          elif command -v brew >/dev/null 2>&1 && brew list openssl@3 >/dev/null 2>&1; then
            echo "$(brew --prefix openssl@3)/bin" >> "$GITHUB_PATH"
          else
            brew install openssl@3
            echo "$(brew --prefix openssl@3)/bin" >> "$GITHUB_PATH"
          fi

      - name: Validate version sync
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          bash ./scripts/check-version-sync.sh

      - name: Run managed bundle policy checks
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          bash ./scripts/test_managed_bundle_policy.sh
          bash ./scripts/test_managed_bundle_key_workflow.sh

      - name: Build and test
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          zig build test
          zig build bundle

      - name: Build Linux release archive
        working-directory: SpiderVenoms
        env:
          SPIDERWEB_REPO_DIR: ${{ github.workspace }}/Spiderweb
        run: |
          set -euo pipefail
          bash ./scripts/package-spidervenoms-linux-release.sh --out-dir "$PWD/dist"

      - name: Verify release archive contents
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          archive_path="$PWD/dist/spidervenoms-managed-local-linux-${{ matrix.arch_label }}.tar.gz"
          sha_path="${archive_path}.sha256"
          test -f "$archive_path"
          test -f "$sha_path"
          python3 - "$archive_path" <<'PY'
          import sys
          import tarfile

          archive_path = sys.argv[1]
          with tarfile.open(archive_path, "r:gz") as archive:
              names = archive.getnames()

          assert any(name.endswith("share/spidervenoms/bundles/managed-local/release.json") for name in names)
          assert any(name.endswith("bin/spiderweb-local-service") for name in names)
          PY

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spidervenoms-packages-linux-${{ matrix.arch_label }}
          path: |
            SpiderVenoms/dist/spidervenoms-managed-local-linux-${{ matrix.arch_label }}.tar.gz
            SpiderVenoms/dist/spidervenoms-managed-local-linux-${{ matrix.arch_label }}.tar.gz.sha256
          if-no-files-found: error

  macos-build-and-test:
    name: macos-build-and-test
    runs-on: macos-latest
    steps:
      - name: Checkout SpiderVenoms
        uses: actions/checkout@v4
        with:
          path: SpiderVenoms

      - name: Checkout Spiderweb
        uses: actions/checkout@v4
        with:
          repository: DeanoC/Spiderweb
          path: Spiderweb
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Validate version sync
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          bash ./scripts/check-version-sync.sh

      - name: Run managed bundle policy checks
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          bash ./scripts/test_managed_bundle_policy.sh
          bash ./scripts/test_managed_bundle_key_workflow.sh

      - name: Build and test
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          zig build
          zig build test

      - name: Build macOS release archive
        working-directory: SpiderVenoms
        env:
          SPIDERWEB_REPO_DIR: ${{ github.workspace }}/Spiderweb
        run: |
          set -euo pipefail
          bash ./scripts/package-spidervenoms-macos-release.sh --out-dir "$PWD/dist"

      - name: Verify macOS release archive contents
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          archive_path="$PWD/dist/spidervenoms-managed-local-macos-$(uname -m | sed 's/amd64/x86_64/; s/aarch64/arm64/').tar.gz"
          sha_path="${archive_path}.sha256"
          test -f "$archive_path"
          test -f "$sha_path"
          python3 - "$archive_path" <<'PY'
          import sys
          import tarfile

          archive_path = sys.argv[1]
          with tarfile.open(archive_path, "r:gz") as archive:
              names = archive.getnames()

          assert any(name.endswith("share/spidervenoms/bundles/managed-local/release.json") for name in names)
          assert any(name.endswith("bin/spiderweb-local-service") for name in names)
          PY

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spidervenoms-packages-macos
          path: |
            SpiderVenoms/dist/spidervenoms-managed-local-macos-*.tar.gz
            SpiderVenoms/dist/spidervenoms-managed-local-macos-*.tar.gz.sha256
          if-no-files-found: error

  release-facts:
    name: release-facts
    runs-on: ubuntu-latest
    needs:
      - linux-build-test-and-package
      - macos-build-and-test
    steps:
      - name: Checkout SpiderVenoms
        uses: actions/checkout@v4
        with:
          path: SpiderVenoms

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: spidervenoms-packages-*
          merge-multiple: true
          path: SpiderVenoms/dist

      - name: Generate release facts
        working-directory: SpiderVenoms
        run: |
          set -euo pipefail
          python3 ./scripts/render_release_facts.py --out "$PWD/dist/spidervenoms-release-facts.json"
          test -f "$PWD/dist/spidervenoms-release-facts.json"

      - name: Upload release facts
        uses: actions/upload-artifact@v4
        with:
          name: spidervenoms-release-facts
          path: SpiderVenoms/dist/spidervenoms-release-facts.json
          if-no-files-found: error
